name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on: git tag v1.0.1 && git push --tags

permissions:
  contents: write   # Needed to create GitHub Releases

jobs:
  # ── Build Windows ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (NSIS + Portable)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite renderer
        run: npm run build:renderer

      - name: Convert PNG icon to ICO
        run: npx electron-icon-builder --input=assets/icons/nexus.png --output=assets/icons/
        continue-on-error: true   # Non-fatal if icon conversion fails

      - name: Build Windows packages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/latest.yml
          retention-days: 7

  # ── Build macOS ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:renderer
      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*.dmg
          retention-days: 7

  # ── Build Linux ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:renderer
      - name: Build Linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/*.AppImage
          retention-days: 7

  # ── Create Draft GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "Nexus Netplay Hub ${{ steps.version.outputs.VERSION }}"
          draft:      true        # ← Draft حتى تراجعه يدوياً قبل النشر
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎮 Nexus Netplay Hub ${{ steps.version.outputs.VERSION }}

            ### التنزيل
            | النظام | الملف |
            |--------|-------|
            | Windows (مثبّت) | `Nexus-Netplay-Setup-*.exe` |
            | Windows (Portable) | `Nexus-Netplay-Portable-*.exe` |
            | macOS | `Nexus-Netplay-*-mac.dmg` |
            | Linux | `Nexus-Netplay-*-linux.AppImage` |

            ### ما الجديد؟
            <!-- سيتم ملؤه تلقائياً من Commits -->
          files: |
            artifacts/windows-build/*.exe
            artifacts/windows-build/latest.yml
            artifacts/macos-build/*.dmg
            artifacts/linux-build/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
