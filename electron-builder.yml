appId: com.nexus.netplay.hub
productName: "Nexus Netplay Hub"
copyright: "© 2025 Nexus Team"

directories:
  output: dist-electron
  buildResources: assets

files:
  - dist/**/*
  - src/main/**/*
  - src/shared/**/*
  - package.json
  - "!src/renderer/**/*"
  - "!**/*.map"
  - "!scripts/**/*"

asar: true
asarUnpack:
  - "node_modules/simple-peer/**"
  - "node_modules/ws/**"
  - "node_modules/nat-upnp/**"

publish:
  provider: github
  owner: guest1200assaf-cell
  repo: Nexus-Netplay
  releaseType: release
  private: false

win:
  icon: assets/icons/icons/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  installerIcon: assets/icons/icons/icon.ico
  uninstallerIcon: assets/icons/icons/icon.ico
  installerHeaderIcon: assets/icons/icons/icon.ico
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "Nexus Netplay Hub"
  license: LICENSE

linux:
  icon: assets/icons/icons/
  category: Game
  artifactName: "${productName}-${version}.${ext}"
  maintainer: "Nexus Team <nexus@example.com>"
  description: "نظام المحاكاة الشبكي العابر للمنصات"
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

compression: maximum
removePackageScripts: true
